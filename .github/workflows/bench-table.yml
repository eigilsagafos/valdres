# Refreshes the committed benchmark snapshots from Bencher's public API after
# each push/merge to main re-benchmarks:
#   - README.md comparison table          (scripts/gen-bench-table.ts)
#   - docs/content/bench-summary.json      (scripts/gen-bench-summary.ts)
# Triggered by the "Bencher (base)" workflow completing (rather than on: push)
# so the base lane has finished uploading the new numbers first — the snapshots
# then reflect the just-merged commit instead of lagging one behind. Also
# runnable on demand.
#
# The live, always-current view is bencher.dev/perf/valdres; these are committed
# snapshots. The generators only READ the public API, so no token / Bencher.dev
# environment is needed. (The docs summary step no-ops on branches without the
# docs site, so it's harmless until the docs land on main.)
name: Refresh benchmark snapshots

on:
    workflow_run:
        workflows: ["Bencher (base)"]
        types: [completed]
    workflow_dispatch:

permissions:
    contents: write

concurrency:
    group: bench-table
    cancel-in-progress: false

jobs:
    refresh:
        # Manual runs always proceed; workflow_run only after a successful base
        # run (don't refresh off a failed/partial upload).
        if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: main
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.13
            - name: Regenerate README benchmark table
              run: bun run scripts/gen-bench-table.ts
            - name: Regenerate docs benchmark summary
              run: bun run scripts/gen-bench-summary.ts
            - name: Commit if changed
              run: |
                  git add README.md
                  [ -f docs/content/bench-summary.json ] && git add docs/content/bench-summary.json
                  if git diff --cached --quiet; then
                      echo "Benchmark snapshots unchanged."
                  else
                      git config user.name "github-actions[bot]"
                      git config user.email "github-actions[bot]@users.noreply.github.com"
                      git commit -m "docs: refresh Bencher benchmark snapshots [skip ci]"
                      git push origin HEAD:main
                  fi
