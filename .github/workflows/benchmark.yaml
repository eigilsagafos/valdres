name: Benchmark
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    workflow_dispatch:
        inputs:
            reset_baseline:
                description: "Reset benchmark baseline (deletes all historical data)"
                type: boolean
                default: false

permissions:
    contents: write
    deployments: write
    pull-requests: write

# Prevent concurrent runs on the same ref — a second main push would race
# on the benchmark-data branch, silently dropping the first run's entry.
concurrency:
    group: benchmark-${{ github.ref }}
    cancel-in-progress: true

jobs:
    benchmark:
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v4

            - name: Configure git identity
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - uses: oven-sh/setup-bun@v2

            - name: Install
              run: bun install

            - name: Build
              run: bun run build

            - name: Run benchmarks
              # test:bench cleans stale results and runs files serially
              working-directory: packages/valdres
              run: bun run test:bench

            - name: Generate benchmark JSON
              run: bun run scripts/generate-bench-json.ts

            # ── Baseline reset (manual trigger) ────────────────────────────
            - name: Reset benchmark baseline
              if: inputs.reset_baseline == true
              run: |
                  git push origin --delete gh-pages || true
                  git push origin --delete benchmark-data || true
                  echo "Deleted gh-pages and benchmark-data branches — baseline will be rebuilt."

            # ── GitHub Pages trend chart (visualization only) ───────────────
            - name: Create gh-pages branch if missing
              if: github.ref == 'refs/heads/main' || inputs.reset_baseline == true
              run: |
                  if ! git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
                    git checkout --orphan gh-pages
                    git rm -rf .
                    git commit --allow-empty -m "Initialize gh-pages for benchmark data"
                    git push origin gh-pages
                    git checkout ${{ github.sha }}
                  fi

            - name: Store benchmark result (GitHub Pages chart)
              uses: benchmark-action/github-action-benchmark@v1
              with:
                  name: "valdres benchmarks"
                  tool: "customSmallerIsBetter"
                  output-file-path: bench-results.json
                  gh-pages-branch: gh-pages
                  benchmark-data-dir-path: dev/bench
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  auto-push: ${{ github.ref == 'refs/heads/main' }}
                  summary-always: true

            # ── Compact history on benchmark-data branch ────────────────────
            # Our own lean format: ~1KB/run vs ~6KB/run on gh-pages.
            # This is the primary data source for regression detection.
            # Uses a worktree to avoid disturbing the main checkout.
            - name: Store benchmark history
              if: github.ref == 'refs/heads/main'
              continue-on-error: true
              run: |
                  CURRENT_SHA=$(git rev-parse --short HEAD)

                  # Fetch existing history (or start fresh)
                  git fetch origin benchmark-data --depth=1 2>/dev/null || true
                  git show origin/benchmark-data:results.json > /tmp/bench-existing.json 2>/dev/null || echo '[]' > /tmp/bench-existing.json

                  # Append new entry and keep last 50 runs
                  bun run scripts/append-bench-history.ts /tmp/bench-existing.json bench-history-entry.json /tmp/bench-results.json

                  # Commit to benchmark-data branch using a temporary worktree
                  TMPDIR=$(mktemp -d)
                  git worktree add --detach "$TMPDIR"
                  cd "$TMPDIR"
                  git checkout --orphan benchmark-data-update
                  git rm -rf . > /dev/null 2>&1 || true
                  cp /tmp/bench-results.json results.json
                  git add results.json
                  git commit -m "Benchmark results for $CURRENT_SHA"
                  git push origin benchmark-data-update:benchmark-data --force
                  cd -
                  git worktree remove "$TMPDIR"

            # ── Regression detection (PRs only) ────────────────────────────
            - name: Fetch benchmark history
              if: github.event_name == 'pull_request'
              run: |
                  git fetch origin benchmark-data --depth=1 2>/dev/null || true
                  git fetch origin gh-pages --depth=1 2>/dev/null || true

            - name: Check for benchmark regressions
              if: github.event_name == 'pull_request'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITHUB_REPOSITORY: ${{ github.repository }}
                  GITHUB_EVENT_PATH: ${{ github.event_path }}
              run: bun run scripts/check-bench-regression.ts

            # ── README update (main only) ──────────────────────────────────
            - name: Update README with benchmark table
              if: github.ref == 'refs/heads/main'
              run: |
                  bun run scripts/update-bench-readme.ts
                  git add README.md
                  git diff --staged --quiet || git commit -m "Update benchmark results in README"
                  git push
