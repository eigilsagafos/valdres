name: Benchmark
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

permissions:
    contents: write
    deployments: write

jobs:
    benchmark:
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v4

            - name: Configure git identity
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - uses: oven-sh/setup-bun@v2

            - name: Install
              run: bun install

            - name: Build
              run: bun run build

            - name: Clean previous results
              run: rm -f packages/valdres/test/performance/bench-results.ndjson

            - name: Run benchmarks
              working-directory: packages/valdres
              run: bun run test:bench

            - name: Generate results
              run: bun run scripts/update-bench-readme.ts

            # Ensure gh-pages branch exists for benchmark history
            - name: Create gh-pages branch if missing
              run: |
                  if ! git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
                    git checkout --orphan gh-pages
                    git reset --hard
                    git commit --allow-empty -m "Initialize gh-pages for benchmark data"
                    git push origin gh-pages
                    git checkout -
                  fi

            # GitHub Pages trend chart
            - name: Store benchmark result
              uses: benchmark-action/github-action-benchmark@v1
              with:
                  name: "valdres benchmarks"
                  tool: "customSmallerIsBetter"
                  output-file-path: bench-results.json
                  gh-pages-branch: gh-pages
                  benchmark-data-dir-path: dev/bench
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  auto-push: ${{ github.ref == 'refs/heads/main' }}
                  comment-on-alert: true
                  summary-always: true
                  alert-threshold: "150%"
                  fail-on-alert: true

            # Update README on main only
            - name: Commit README update
              if: github.ref == 'refs/heads/main'
              run: |
                  git add README.md
                  git diff --staged --quiet || git commit -m "Update benchmark results in README"
                  git push
