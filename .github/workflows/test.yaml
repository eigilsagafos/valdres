name: Test
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
jobs:
    test:
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
            - name: Install
              run: bun install
            - name: Build
              run: bun run build
            - name: Test
              run: bun run test:ci
            - name: Test Summary
              if: always()
              run: |
                  echo "## Test Results" >> $GITHUB_STEP_SUMMARY
                  for f in $(find packages -name 'junit*.xml' 2>/dev/null); do
                    pkg=$(echo "$f" | sed 's|packages/||;s|/junit.*\.xml||')
                    tests=$(grep -o 'tests="[0-9]*"' "$f" | head -1 | grep -o '[0-9]*')
                    failures=$(grep -o 'failures="[0-9]*"' "$f" | head -1 | grep -o '[0-9]*')
                    time=$(grep -o 'time="[0-9.]*"' "$f" | head -1 | grep -o '[0-9.]*')
                    if [ "$failures" = "0" ]; then
                      echo "- ✅ **$pkg** — $tests tests passed (${time}s)" >> $GITHUB_STEP_SUMMARY
                    else
                      echo "- ❌ **$pkg** — $failures/$tests failed (${time}s)" >> $GITHUB_STEP_SUMMARY
                    fi
                  done
