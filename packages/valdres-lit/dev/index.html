<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Front Row — built on valdres-lit</title>
        <style>
            /* Theme tokens live on :root so they pierce every component's
               shadow DOM. Dark-first neon-gig-poster palette, with a light
               override. */
            :root {
                color-scheme: dark light;

                --fr-bg: #0b0b14;
                --fr-bg-2: #11111d;
                --fr-surface: #15151f;
                --fr-ink: #f2f0fb;
                --fr-muted: color-mix(in oklch, var(--fr-ink) 55%, transparent);
                --fr-line: color-mix(in oklch, var(--fr-ink) 14%, transparent);

                --fr-accent-1: #ff4d8d;
                --fr-accent-2: #7c5cff;
                --fr-accent: linear-gradient(
                    135deg,
                    var(--fr-accent-1),
                    var(--fr-accent-2)
                );
                --fr-glow: #ffba49;
                --fr-available: color-mix(
                    in oklch,
                    var(--fr-ink) 22%,
                    transparent
                );
                --fr-sold: color-mix(in oklch, var(--fr-ink) 10%, transparent);
                --fr-success: #3ddc97;
                --fr-error: #f5614b;

                --fr-radius: 16px;
                --fr-shadow: 0 18px 50px -24px rgb(0 0 0 / 0.7);
                --fr-font:
                    system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
                --fr-display:
                    "Archivo", "Oswald", system-ui, sans-serif;
                --fr-mono: ui-monospace, "SF Mono", Menlo, monospace;
            }

            @media (prefers-color-scheme: light) {
                :root {
                    --fr-bg: #f5f4fb;
                    --fr-bg-2: #ffffff;
                    --fr-surface: #ffffff;
                    --fr-ink: #1a1726;
                    --fr-line: color-mix(
                        in oklch,
                        var(--fr-ink) 12%,
                        transparent
                    );
                    --fr-glow: #e8930c;
                    --fr-available: color-mix(
                        in oklch,
                        var(--fr-ink) 20%,
                        transparent
                    );
                    --fr-sold: color-mix(
                        in oklch,
                        var(--fr-ink) 8%,
                        transparent
                    );
                    --fr-shadow: 0 18px 50px -28px rgb(40 20 80 / 0.35);
                }
            }

            html,
            body {
                margin: 0;
                background:
                    radial-gradient(
                        1200px 600px at 50% -10%,
                        color-mix(in oklch, var(--fr-accent-2) 22%, transparent),
                        transparent 60%
                    ),
                    var(--fr-bg);
                color: var(--fr-ink);
                font-family: var(--fr-font);
                line-height: 1.5;
                -webkit-font-smoothing: antialiased;
            }
            front-row-app {
                display: block;
                min-height: 100vh;
            }
        </style>
    </head>
    <body>
        <front-row-app></front-row-app>

        <script>
            window.process = { env: { NODE_ENV: "development" } }
        </script>
        <script type="module" src="./main.ts"></script>
    </body>
</html>
