<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Search library benchmark</title>
        <style>
            :root {
                color-scheme: light dark;
                --bg: #fafafa;
                --fg: #111;
                --muted: #888;
                --border: #8884;
                --accent: #5b8def;
                --good: #2ecc71;
                --warn: #f39c12;
                --slow: #e74c3c;
                font-family:
                    system-ui,
                    -apple-system,
                    "Segoe UI",
                    Roboto,
                    sans-serif;
            }
            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: #15161a;
                    --fg: #e8e8e8;
                    --muted: #999;
                }
            }
            * {
                box-sizing: border-box;
            }
            body {
                background: var(--bg);
                color: var(--fg);
                max-width: 1100px;
                margin: 1.5rem auto;
                padding: 0 1rem 4rem;
                line-height: 1.5;
            }
            h1 {
                margin: 0 0 0.25rem;
                font-size: 1.6rem;
                letter-spacing: -0.02em;
            }
            .lede {
                color: var(--muted);
                margin: 0 0 1rem;
                font-size: 0.92rem;
            }
            .controls {
                display: flex;
                flex-wrap: wrap;
                gap: 0.75rem 1.5rem;
                padding: 0.75rem 1rem;
                border: 1px solid var(--border);
                border-radius: 8px;
                margin-bottom: 1rem;
                align-items: center;
            }
            .controls label {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                font-size: 0.9rem;
            }
            .controls select,
            .controls input[type="text"] {
                font: inherit;
                padding: 0.4rem 0.6rem;
                border-radius: 6px;
                border: 1px solid var(--border);
                background: transparent;
                color: inherit;
            }
            .btn {
                font: inherit;
                padding: 0.45rem 0.85rem;
                border-radius: 6px;
                border: 1px solid var(--border);
                background: transparent;
                color: inherit;
                cursor: pointer;
            }
            .btn:hover {
                border-color: var(--accent);
            }
            .btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }
            .search-row {
                margin-bottom: 1rem;
            }
            .search-row input {
                width: 100%;
                font: inherit;
                font-size: 1rem;
                padding: 0.65rem 0.9rem;
                border-radius: 8px;
                border: 1px solid var(--border);
                background: transparent;
                color: inherit;
                outline: none;
            }
            .search-row input:focus {
                border-color: var(--accent);
            }
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: 0.75rem;
            }
            .lib {
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 0.85rem 1rem;
                min-height: 220px;
            }
            .lib-name {
                font-weight: 600;
                margin-bottom: 0.25rem;
                display: flex;
                justify-content: space-between;
                align-items: baseline;
                gap: 0.5rem;
            }
            .lib-name .ms {
                font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                font-size: 0.85rem;
                color: var(--muted);
            }
            .lib-stats {
                font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                font-size: 0.8rem;
                color: var(--muted);
                margin-bottom: 0.5rem;
            }
            .lib-stats .fast {
                color: var(--good);
            }
            .lib-stats .mid {
                color: var(--warn);
            }
            .lib-stats .slow {
                color: var(--slow);
            }
            .result {
                font-size: 0.85rem;
                padding: 0.2rem 0;
                border-top: 1px dotted var(--border);
            }
            .result:first-of-type {
                border-top: none;
            }
            .result .rid {
                font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                font-size: 0.75rem;
                color: var(--muted);
                margin-right: 0.4rem;
            }
            .empty {
                color: var(--muted);
                font-size: 0.85rem;
                font-style: italic;
            }
            .summary {
                margin-top: 1.5rem;
                padding: 0.75rem 1rem;
                border-top: 1px solid var(--border);
                font-size: 0.85rem;
                color: var(--muted);
            }
            .summary code {
                color: var(--fg);
            }
            .badge {
                display: inline-block;
                padding: 0.05rem 0.45rem;
                border-radius: 999px;
                font-size: 0.7rem;
                font-family: ui-monospace, monospace;
            }
            .badge.fastest {
                background: var(--good);
                color: white;
            }
        </style>
    </head>
    <body>
        <h1>Search library benchmark</h1>
        <p class="lede">
            Live insertion + query benchmarks for valdres'
            <code>atomFamilySearch</code> vs MiniSearch, FlexSearch, and
            Fuse.js. The corpus is procedurally generated "movie-like"
            data (title + plot + year + genre) — same docs go into every
            library so timings are apples-to-apples.
        </p>
        <div id="root"></div>

        <script>
            // Skip valdres' dev-mode deepFreeze — the dominant cost
            // during bulk index inserts. We do this with a dedicated
            // flag instead of NODE_ENV=production so Bun keeps HMR /
            // React Refresh enabled for the dev server.
            globalThis.__valdres_dev_skip_freeze__ = true
            window.process = window.process || { env: { VALDRES_VERSION: "demo" } }
        </script>
        <script type="module" src="./index.tsx"></script>
    </body>
</html>
