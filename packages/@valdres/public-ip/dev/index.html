<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>@valdres/public-ip demo</title>
        <style>
            :root {
                color-scheme: light dark;
                font-family: ui-sans-serif, system-ui, sans-serif;
            }
            body {
                max-width: 48rem;
                margin: 3rem auto;
                padding: 0 1rem;
                line-height: 1.5;
            }
            h1 {
                margin-bottom: 0.25rem;
            }
            .sub {
                color: color-mix(in srgb, currentColor 60%, transparent);
                margin-top: 0;
            }
            .grid {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 1rem;
            }
            .grid-2 {
                grid-template-columns: 1fr 1fr;
            }
            @media (max-width: 60rem) {
                .grid {
                    grid-template-columns: 1fr;
                }
            }
            .card {
                border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
                border-radius: 0.5rem;
                padding: 1rem 1.25rem;
                margin: 1rem 0;
            }
            .ip {
                font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                font-size: 1.25rem;
                word-break: break-all;
            }
            label {
                display: block;
                font-size: 0.85rem;
                margin-top: 0.75rem;
            }
            input,
            textarea {
                width: 100%;
                font: inherit;
                padding: 0.5rem;
                border: 1px solid color-mix(in srgb, currentColor 25%, transparent);
                border-radius: 0.25rem;
                background: transparent;
                color: inherit;
                box-sizing: border-box;
            }
            textarea {
                min-height: 4.5rem;
                font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            }
            button {
                margin-top: 0.75rem;
                padding: 0.5rem 1rem;
                font: inherit;
                border-radius: 0.25rem;
                cursor: pointer;
            }
            .meta {
                font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                font-size: 0.85rem;
                white-space: pre-wrap;
            }
            .pill {
                display: inline-block;
                padding: 0.15rem 0.5rem;
                border-radius: 999px;
                font-size: 0.75rem;
                background: color-mix(in srgb, currentColor 10%, transparent);
            }
        </style>
    </head>
    <body>
        <h1>@valdres/public-ip</h1>
        <p class="sub">Reactive public IP via valdres atoms.</p>

        <div class="grid">
            <div class="card">
                <div>Default <span id="default-status" class="pill">loading…</span></div>
                <div id="default-ip" class="ip">—</div>
                <label for="default-endpoints">Endpoints (one per line)</label>
                <textarea id="default-endpoints"></textarea>
                <button id="default-refetch">Refetch</button>
            </div>

            <div class="card">
                <div>IPv4 <span id="v4-status" class="pill">loading…</span></div>
                <div id="v4-ip" class="ip">—</div>
                <label for="v4-endpoints">Endpoints (one per line)</label>
                <textarea id="v4-endpoints"></textarea>
                <button id="v4-refetch">Refetch IPv4</button>
            </div>

            <div class="card">
                <div>IPv6 <span id="v6-status" class="pill">loading…</span></div>
                <div id="v6-ip" class="ip">—</div>
                <label for="v6-endpoints">Endpoints (one per line)</label>
                <textarea id="v6-endpoints"></textarea>
                <button id="v6-refetch">Refetch IPv6</button>
            </div>
        </div>

        <div class="card">
            <strong>Shared config</strong>
            <label for="maxAge">maxAge (ms)</label>
            <input id="maxAge" type="number" min="100" step="100" />
        </div>

        <div class="card">
            <strong>cacheMeta</strong>
            <div class="grid">
                <pre id="default-meta" class="meta">—</pre>
                <pre id="v4-meta" class="meta">—</pre>
                <pre id="v6-meta" class="meta">—</pre>
            </div>
        </div>

        <script>
            window.process = { env: { NODE_ENV: "development" } }
        </script>
        <script type="module" src="./main.ts"></script>
    </body>
</html>
