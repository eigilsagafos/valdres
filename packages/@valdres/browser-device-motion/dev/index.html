<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>@valdres/browser-device-motion demo</title>
        <style>
            :root {
                color-scheme: light dark;
                font-family:
                    system-ui,
                    -apple-system,
                    sans-serif;
            }
            body {
                max-width: 720px;
                margin: 2rem auto;
                padding: 0 1rem;
                line-height: 1.5;
            }
            h1 {
                margin-bottom: 0;
            }
            .muted {
                color: color-mix(in srgb, currentColor 60%, transparent);
                font-size: 0.9rem;
            }
            .row {
                display: flex;
                gap: 0.5rem;
                align-items: center;
                flex-wrap: wrap;
                margin-top: 1rem;
            }
            .pill {
                display: inline-block;
                padding: 0.15rem 0.6rem;
                border-radius: 999px;
                font-size: 0.8rem;
                background: color-mix(in srgb, currentColor 10%, transparent);
            }
            .pill-active,
            .pill-granted {
                background: color-mix(in srgb, #22c55e 25%, transparent);
            }
            .pill-denied {
                background: color-mix(in srgb, #ef4444 25%, transparent);
            }
            .pill-prompt {
                background: color-mix(in srgb, #eab308 25%, transparent);
            }
            .pill-idle,
            .pill-unsupported {
                background: color-mix(in srgb, currentColor 15%, transparent);
            }
            .grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 1rem;
                margin-top: 1.5rem;
            }
            @media (max-width: 32rem) {
                .grid {
                    grid-template-columns: 1fr;
                }
            }
            .card {
                border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
                border-radius: 0.5rem;
                padding: 0.75rem 1rem;
            }
            .label {
                font-size: 0.85rem;
                color: color-mix(in srgb, currentColor 60%, transparent);
            }
            .vector {
                font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                font-size: 1.1rem;
                display: grid;
                grid-template-columns: auto 1fr;
                gap: 0.25rem 0.75rem;
                margin-top: 0.25rem;
            }
            .axis {
                color: color-mix(in srgb, currentColor 50%, transparent);
            }
            .scene {
                position: relative;
                margin-top: 1.5rem;
                height: 380px;
                border-radius: 12px;
                overflow: hidden;
                background: #0b1220;
            }
            .scene canvas {
                touch-action: none;
            }
            .legend {
                position: absolute;
                top: 12px;
                left: 12px;
                background: rgba(15, 23, 42, 0.7);
                color: #e2e8f0;
                font: 11px ui-monospace, SFMono-Regular, Menlo, monospace;
                padding: 8px 10px;
                border-radius: 6px;
                line-height: 1.6;
                pointer-events: none;
            }
            .legend span {
                margin-right: 0.4rem;
                font-size: 0.8rem;
            }
            .sparkline {
                position: relative;
                margin-top: 0.75rem;
                height: 60px;
                border: 1px solid #1e293b;
                border-radius: 8px;
                background: #0b1220;
                overflow: hidden;
            }
            .sparkline svg {
                width: 100%;
                height: 100%;
                display: block;
            }
            .sparkline-line {
                stroke: #67e8f9;
                stroke-width: 0.6;
                fill: none;
            }
            .sparkline-fill {
                fill: url(#spark-gradient);
                stroke: none;
            }
            .sparkline-label {
                position: absolute;
                top: 6px;
                left: 10px;
                font: 10px ui-monospace, SFMono-Regular, Menlo, monospace;
                color: #94a3b8;
                pointer-events: none;
            }
            .sparkline-peak {
                position: absolute;
                bottom: 6px;
                right: 10px;
                font: 10px ui-monospace, SFMono-Regular, Menlo, monospace;
                color: #cbd5e1;
                pointer-events: none;
            }
            button {
                font: inherit;
                padding: 0.5rem 0.9rem;
                border: 1px solid color-mix(in srgb, currentColor 30%, transparent);
                border-radius: 0.5rem;
                background: transparent;
                color: inherit;
                cursor: pointer;
            }
            pre {
                font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                font-size: 0.8rem;
                margin-top: 1rem;
                padding: 0.75rem 1rem;
                border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
                border-radius: 0.5rem;
                white-space: pre-wrap;
            }
        </style>
    </head>
    <body>
        <h1>@valdres/browser-device-motion</h1>
        <p class="muted">
            Reactive wrapper around <code>DeviceMotionEvent</code>.
            Accelerometer + gyroscope live values. iOS Safari requires a
            user-gesture call to <code>requestMotionPermission()</code>.
        </p>
        <div id="root"></div>
        <script>
            window.process = window.process || { env: {} }
        </script>
        <script type="module" src="./index.tsx"></script>
    </body>
</html>
