<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>@valdres/browser-focus demo</title>
        <style>
            :root {
                color-scheme: light dark;
                font-family:
                    system-ui,
                    -apple-system,
                    sans-serif;
            }
            body {
                max-width: 720px;
                margin: 2rem auto;
                padding: 0 1rem;
                line-height: 1.5;
            }
            h1 {
                margin-bottom: 0;
            }
            .muted {
                color: #888;
                font-size: 0.9rem;
            }
            .card {
                margin-top: 1.5rem;
                border: 1px solid #8884;
                border-radius: 8px;
                padding: 1rem 1.25rem;
                display: flex;
                align-items: center;
                gap: 1rem;
            }
            .dot {
                width: 12px;
                height: 12px;
                border-radius: 50%;
                background: #ccc;
            }
            .dot.on {
                background: #2ecc71;
            }
            .label {
                font-family:
                    ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
                font-size: 1rem;
            }
            .log {
                margin-top: 1.5rem;
                font-family:
                    ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
                font-size: 0.85rem;
                max-height: 200px;
                overflow: auto;
                border: 1px solid #8884;
                border-radius: 8px;
                padding: 0.75rem 1rem;
            }
            .log li {
                list-style: none;
                padding: 0;
            }
        </style>
    </head>
    <body>
        <h1>@valdres/browser-focus</h1>
        <p class="muted">
            Reactive wrapper for <code>document.hasFocus()</code>. Click
            another window or tab to blur, click back to focus.
        </p>
        <div id="root"></div>

        <script>
            // valdres reads process.env.VALDRES_VERSION at import time
            window.process = window.process || { env: {} }
        </script>
        <script type="module" src="./index.tsx"></script>
    </body>
</html>
